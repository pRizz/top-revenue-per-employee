name: Nightly Refresh

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "nightly-refresh"
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh data
        run: npm run data:refresh

      - name: Detect tracked data changes
        id: tracked_changes
        run: |
          if [ -n "$(git status --porcelain data public/data)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed data
        if: steps.tracked_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          git commit -m "chore(data): nightly refresh"
          git push origin main

      - name: Skip push when data is unchanged
        if: steps.tracked_changes.outputs.has_changes != 'true'
        run: echo "Nightly refresh produced no material tracked changes; skipping commit and push."
